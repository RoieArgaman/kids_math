runConfig:
  # Warm instances to absorb the class-start login burst (bcrypt is CPU-bound). After the C9
  # relocation to europe-west4 (co-located with Firestore), a load test showed minInstances=3
  # brings login latency to ~676ms median / p95 3.73s (was ~16s p95 cross-region on us-east4).
  # Always-on cost of 3 instances; tune down if the burst profile is gentler than modeled.
  minInstances: 3
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

env:
  - variable: NODE_ENV
    value: production
  # Rate limiter enforcement (roadmap 2.7). ENABLED 2026-07-17 after all gates cleared:
  # TTL policies active on rate_limits/account_lockouts; TRUSTED_PROXY_HOPS verified = 2 vs real
  # X-Forwarded-For (Appendix A); thresholds validated by a load test (20 users behind one NAT →
  # no cross-user false-positives, only genuine per-key over-threshold flagged). Over-threshold
  # requests now get a 429. Fail-open preserved. Reversible: set to "0" to revert to shadow
  # instantly. See OBSERVABILITY_RUNBOOK.md.
  - variable: RATE_LIMIT_ENFORCE
    value: "1"
  # JWT signing secret. Rotation runbook: roadmap/PRODUCTION_HARDENING_ROADMAP.md → Appendix B.
  # To rotate, add a new version to the `kids-math-jwt-secret` Secret Manager secret and pin it
  # here (e.g. `secret: kids-math-jwt-secret@latest` or a specific version). Because sessions
  # are now revocable via `tokenVersion`, a rotation can force re-auth without stranding users.
  - variable: JWT_SECRET
    secret: kids-math-jwt-secret

