name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:

env:
  # Align with deploy.sh / local: predictable path for actions/cache + playwright install
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

jobs:
  # Change detection (~3s). Sets docs_only=true when the diff touches ONLY non-code files,
  # which skips the expensive lint/unit/e2e jobs below. The secret scan deliberately does
  # NOT depend on this — it always runs (see security-scan).
  #
  # Implemented as a plain GitHub-API + regex check rather than a glob-filter action: we
  # need "EVERY changed file is a doc" (docs-only), and path-filter actions answer the
  # different question "did ANY file match?" — the composition is easy to get subtly wrong.
  # Here the logic is explicit and fails SAFE: any file that is NOT recognized as a doc
  # (including a brand-new top-level path) makes docs_only=false and runs the full suite.
  #
  # Non-code = Markdown anywhere (`*.md`), or under `docs/`, `roadmap/`, `.claude/` (the whole
  # agent/tooling tree: rules, docs, commands, plans, settings.json, launch.json), or the
  # top-level `LICENSE`. Nothing CI runs compiles, imports, or exercises these, so the suite
  # can't validate them.
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Detect docs-only diff
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            files="$(gh api --paginate "repos/$REPO/pulls/$PR/files" -q '.[].filename')"
          else
            files="$(gh api "repos/$REPO/compare/$BEFORE...$AFTER" -q '.files[].filename')"
          fi
          echo "Changed files:"; printf '%s\n' "$files"
          # A path is "non-code" if it is Markdown anywhere, under docs/ roadmap/ .claude/,
          # or the top-level LICENSE. Anything else counts as code → run the full suite.
          non_doc="$(printf '%s\n' "$files" | grep -vE '(\.md$|^docs/|^roadmap/|^\.claude/|^LICENSE$)' || true)"
          if [ -n "$files" ] && [ -z "$non_doc" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "→ docs-only diff: lint-and-unit and e2e will be skipped (secret scan still runs)."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "→ code present (or empty diff): full suite runs."
            [ -n "$non_doc" ] && { echo "Non-doc files:"; printf '%s\n' "$non_doc"; } || true
          fi

  # Fast gate: lint + testid coverage + unit tests (~45s). Runs in parallel with the
  # e2e shards below, so a lint/unit failure surfaces without waiting on the browser suite.
  # Skipped on docs-only changes.
  lint-and-unit:
    needs: changes
    if: needs.changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check data-testid coverage
        run: npm run check:testids

      - name: Unit tests (with coverage thresholds)
        run: npm run test:coverage

  # Supply-chain / secret scanning (roadmap S6 / Phase 0.5). Runs in parallel with the
  # other jobs. `npm audit` starts non-blocking (continue-on-error) so a newly-disclosed
  # advisory doesn't wedge unrelated PRs; flip to blocking once the tree is clean. The
  # secret scan is blocking — a committed credential must fail the build.
  # NOTE: intentionally has no `needs: changes` / `if:` gate — it ALWAYS runs, even on
  # docs-only diffs, so a secret can never slip in through a Markdown-only change. Keeping
  # it inside the CI workflow is also what lets it keep gating deploy.yml (workflow_run).
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the secret scan can inspect all commits on the branch/PR.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Dependency audit (high+)
        # Non-blocking first; remove continue-on-error to enforce once the tree is clean.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for personal repos. If this repo ever moves under a
          # GitHub ORG, set GITLEAKS_LICENSE (repo secret) or the step fails closed and,
          # because deploy.yml gates on full CI success, would block all deploys.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # E2E, split across 3 parallel shards. Each shard is self-contained (builds its own
  # production server) so the shards run fully in parallel — 3 parallel builds cost the
  # same wall-clock as one, and the shared .next/cache keeps them incremental. This is
  # faster end-to-end than a single shared build that would serialize build -> e2e.
  # Skipped on docs-only changes.
  e2e:
    needs: changes
    if: needs.changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    strategy:
      # One failing shard should not cancel the others — we want the full failure picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Next.js compiler cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: .playwright-browsers
          # Strict key: invalidates when lockfile (incl. @playwright/test) changes — no broad restore-keys
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3
